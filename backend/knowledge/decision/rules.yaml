actions:
  高温热害:
    - 清晨/傍晚喷灌降温（避免正午灼伤）
    - 叶面喷施 0.3% 磷酸二氢钾增强抗逆
    - 对玉米抽雄期重点田块加强水分管理
  大风:
    - 对高秆作物提前查苗扶苗
    - 暂停喷药/灌水作业，防止次生倒伏
  倒伏:
    - 倒伏发生后 24h 内人工扶苗或机械辅助
    - 排查排水沟，避免根系长时间浸水
    - 叶面喷施芸苔素内酯，促进恢复
  暴雨:
    - 提前清沟理墒，确保排水顺畅
    - 对低洼地块准备应急排水
  干旱:
    - 优先保关键生育期地块
    - 灌水避开正午高温时段
  条锈病:
    - 立即使用三唑酮 / 戊唑醇等三唑类药剂全田防治
    - 病点周边 50 米加密监测，3 天复查
    - 联系当地植保站确认是否上报
  草地贪夜蛾:
    - 夜间灯诱+性诱监测虫量
    - 幼虫 3 龄前使用氯虫苯甲酰胺
