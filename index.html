<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>穗安 AI &mdash; &#x519C;&#x4F5C;&#x7269;&#x707E;&#x5BB3;&#x9632;&#x63A7;&#x591A;&#x667A;&#x80FD;&#x4F53;&#x98CE;&#x9669;&#x9884;&#x8B66;&#x7CFB;&#x7EDF;</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Ma+Shan+Zheng&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','Noto Serif SC','serif'], serif: ['Noto Serif SC','serif'] }
        }
      }
    }
  </script>
  <style>
    :root{
      --paper:#edf4ec;--paper-soft:#f3f8f2;--paper-warm:#deeadd;--paper-deep:#c8d9c6;
      --ink-dark:#14110f;--ink:#2a2521;--ink-soft:#524841;--ink-mid:#786c5f;--ink-light:#b5ab98;
      --seal:#b8302a;--seal-deep:#8c1f1c;--seal-soft:#d96760;
      --stone-blue:#2a6e96;--stone-blue-l:#5895b8;
      --stone-green:#5e8466;--stone-green-l:#86a78a;
      --gold:#b88f4e;--gold-soft:#d4b07a;
      --serif-cjk:'Noto Serif SC',serif;
      --serif-en:'Cormorant Garamond',Georgia,serif;
      --brush-cjk:'Ma Shan Zheng',var(--serif-cjk);
      --sans:'Inter','Helvetica Neue',sans-serif;
      --mono:'JetBrains Mono','Menlo',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background-color:var(--paper);
      background-image:
        radial-gradient(ellipse 1200px 600px at 75% -10%,rgba(94,132,102,0.07),transparent 60%),
        radial-gradient(ellipse 900px 700px at -10% 110%,rgba(42,110,150,0.05),transparent 60%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='4'/><feColorMatrix values='0 0 0 0 0.34 0 0 0 0 0.44 0 0 0 0 0.35 0 0 0 0.042 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      background-attachment:fixed;
      color:var(--ink-dark);
      font-family:var(--serif-cjk);
      overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,transparent 0,transparent 320px,rgba(20,17,15,0.012) 320px,rgba(20,17,15,0.012) 321px),
        repeating-linear-gradient(0deg,transparent 0,transparent 640px,rgba(120,108,95,0.018) 640px,rgba(120,108,95,0.018) 641px);
      z-index:0;
    }
    .field-grid{
      background-image:
        repeating-linear-gradient(30deg,transparent 0px,transparent 56px,rgba(94,132,102,0.05) 56px,rgba(94,132,102,0.05) 57px),
        repeating-linear-gradient(-30deg,transparent 0px,transparent 80px,rgba(42,110,150,0.03) 80px,rgba(42,110,150,0.03) 81px);
    }
    .glass{
      background:rgba(237,248,235,0.82);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(20,17,15,0.10);
      box-shadow:0 2px 16px rgba(20,17,15,0.06);
    }
    .glass-green{
      background:rgba(94,132,102,0.08);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(94,132,102,0.22);
    }
    .glass-cyan{
      background:rgba(42,110,150,0.07);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(42,110,150,0.20);
    }
    .glow-green{box-shadow:0 4px 32px rgba(94,132,102,0.14),0 1px 4px rgba(20,17,15,0.06);}
    .text-g{background:linear-gradient(135deg,var(--seal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .text-g2{background:linear-gradient(135deg,var(--stone-green-l),var(--stone-green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    @keyframes float-up{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes radar-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pulse-ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
    @keyframes fade-in-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes wpulse{0%,100%{opacity:.75;transform:translate(-50%,-50%) scale(0.95)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
    @keyframes wring{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}
    @keyframes data-stream{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}
    .float-card{animation:float-up 5s ease-in-out infinite;}
    .pulse-ring1{animation:pulse-ring 2.2s ease-out infinite;}
    .pulse-ring2{animation:pulse-ring 2.2s ease-out .8s infinite;}
    .blink{animation:blink-dot 1.6s ease-in-out infinite;}
    .fade-up{animation:fade-in-up .8s ease-out both;}
    .card-hover{transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;}
    .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(20,17,15,0.10);border-color:rgba(94,132,102,0.35)!important;}
    .stream-line{stroke-dasharray:200;animation:data-stream 3s linear infinite;}
    .section-label{font-size:.65rem;letter-spacing:.18em;font-family:var(--sans);text-transform:uppercase;color:var(--ink-mid);}
    .timeline-line{background:linear-gradient(to bottom,var(--stone-green),var(--stone-blue),var(--stone-green));}
    .sms-bubble{background:rgba(94,132,102,0.06);border:1px solid rgba(94,132,102,0.20);border-radius:14px;}
    .flywheel-arrow{color:var(--stone-green);font-size:1.1rem;line-height:1;}
    nav a{transition:color .2s;color:var(--ink-soft);}
    nav a:hover{color:var(--seal)}
    .btn-primary{background:linear-gradient(135deg,var(--seal),var(--seal-deep));transition:all .25s;}
    .btn-primary:hover{background:linear-gradient(135deg,#c83d35,var(--seal));box-shadow:0 8px 28px rgba(184,48,42,.28);}
    .btn-outline{border:1px solid rgba(20,17,15,0.18);transition:all .25s;color:var(--ink-soft);background:transparent;}
    .btn-outline:hover{border-color:rgba(94,132,102,0.5);background:rgba(94,132,102,0.07);}
    .timeline-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(94,132,102,0.35);background:rgba(94,132,102,0.08);flex-shrink:0;}
    .risk-badge-red{background:rgba(184,48,42,.10);border:1px solid rgba(184,48,42,.25);color:var(--seal-deep);}
    .risk-badge-orange{background:rgba(184,143,78,.10);border:1px solid rgba(184,143,78,.25);color:#7a5a14;}
    .risk-badge-green{background:rgba(94,132,102,.10);border:1px solid rgba(94,132,102,.22);color:#3a5e44;}
    .ink-splash{position:fixed;pointer-events:none;opacity:0.22;filter:blur(0.3px);z-index:0;user-select:none;}
    .ink-splash.s1{top:18vh;left:-30px;transform:rotate(-12deg);width:140px;}
    .ink-splash.s2{top:56vh;right:-40px;transform:rotate(28deg);width:180px;opacity:0.14;}
    .ink-splash.s3{bottom:22vh;left:5vw;width:110px;opacity:0.12;transform:rotate(-6deg);}
    .scroll-prog{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--seal),var(--gold));transform-origin:left;z-index:200;transform:scaleX(0);transition:transform .1s;}
    /* override bright tailwind text classes */
    .text-white{color:var(--ink-dark)!important;}
    .text-green-400{color:var(--stone-green)!important;}
    .bg-green-400{background:var(--stone-green)!important;}
  </style>
</head>

<div class="scroll-prog" id="scroll-prog"></div>

</svg>

/* ─── NAV ─────────────────────────────────────────────────── */
function NavBar() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <nav style={{
      backdropFilter:'blur(20px)',
      background: scrolled ? 'rgba(245,239,226,0.94)':'rgba(245,239,226,0.72)',
      borderBottom:'1px solid rgba(20,17,15,0.07)',
      boxShadow: scrolled ? '0 1px 0 rgba(20,17,15,0.06)':'none',
      transition:'background .3s,box-shadow .3s'
    }} className="fixed top-0 left-0 right-0 z-50">
      <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <img src="logo.png" alt="穗安" style={{width:34,height:34,objectFit:'contain',borderRadius:3}}/>
          <div>
            <div style={{fontFamily:'var(--serif-en)',fontWeight:600,fontSize:'1.05rem',color:'var(--ink-dark)',letterSpacing:'0.01em'}}>穗安 AI</div>
            <div style={{fontSize:'.65rem',color:'var(--ink-mid)',letterSpacing:'.06em',fontFamily:'var(--sans)'}}>穗安 &middot; &#x519C;&#x4E1A;&#x98CE;&#x9669;&#x9884;&#x8B66;</div>
          </div>
        </div>
        <div className="hidden md:flex items-center gap-7 text-sm">
          <a href="#pain">&#x75DB;&#x70B9;</a>
          <a href="#riskmap">&#x98CE;&#x9669;&#x5730;&#x56FE;</a>
          <a href="#features">&#x7CFB;&#x7EDF;&#x80FD;&#x529B;</a>

/* ─── HERO ────────────────────────────────────────────────── */
function Hero() {

        <div style={{textAlign:'center',marginBottom:'2rem'}}>
          <span className="section-label">NATIONAL RISK MAP &middot; &#x5168;&#x56FD;&#x98CE;&#x9669;&#x5730;&#x56FE;</span>
          <h2 style={{fontSize:'clamp(1.8rem,3.5vw,2.6rem)',fontWeight:700,marginTop:'1rem',color:'var(--ink-dark)',fontFamily:'var(--serif-cjk)'}}>
            &#x5168;&#x56FD; 31 &#x4E2A;&#x7701;&#x533A;&#x4F5C;&#x7269;&#x98CE;&#x9669;&#xFF0C;<span className="text-g">&#x5B9E;&#x65F6;&#x5728;&#x7EBF;</span>
          </h2>
          <svg style={{display:'block',margin:'16px auto 8px',width:88,height:14}} viewBox="0 0 88 14" aria-hidden="true">
            <path d="M3 7 Q 25 2 44 8 Q 63 14 85 5" fill="none" stroke="var(--seal)" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <p style={{color:'var(--ink-mid)',marginTop:'.5rem',fontSize:'.9rem'}}>&#x6C14;&#x8C61; &middot; &#x9065;&#x611F; &middot; &#x591A; Agent &#x878D;&#x5408; &mdash; &#x9F20;&#x6807;&#x60AC;&#x505C;&#x7701;&#x4EFD;&#x67E5;&#x770B;&#x5B9E;&#x65F6;&#x9884;&#x8B66;&#x8BE6;&#x60C5;</p>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:'1.8rem'}}>
          {[['demo','&#x6F14;&#x793A;&#x6A21;&#x5F0F;'],['sim','&#x6A21;&#x62DF;&#x63A8;&#x6F14;']].map(([k,l])=>(
            <button key={k} onClick={()=>{setTab(k);setPipeStep(-1);setPipeRunning(false);setSimMarkers([]);setHovered(null);}}
              style={{padding:'7px 22px',borderRadius:6,fontSize:'.78rem',fontFamily:'var(--mono)',letterSpacing:'.1em',cursor:'pointer',
                background:tab===k?'rgba(0,229,204,0.12)':'transparent',
                border:`1.5px solid ${tab===k?'#00e5cc':'rgba(0,200,255,0.25)'}`,
                color:tab===k?'#00e5cc':'#5090a8',
                boxShadow:tab===k?'0 0 14px rgba(0,229,204,0.22)':'none'}}
              dangerouslySetInnerHTML={{__html:l}}/>
          ))}
        </div>
        {tab==='demo'&&<div style={{display:'grid',gridTemplateColumns:'1fr 295px',gap:'1rem',alignItems:'start'}}>
          <div style={{borderRadius:16,overflow:'hidden',border:'1px solid rgba(0,200,255,0.25)',boxShadow:'0 0 48px rgba(0,200,255,0.10),inset 0 0 60px rgba(0,20,60,0.25)',background:mapBg}}>
            <div style={{padding:'9px 14px',borderBottom:'1px solid rgba(0,200,255,0.18)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(0,20,50,0.75)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="blink" style={{width:7,height:7,borderRadius:'50%',background:'#ff3333',display:'inline-block',boxShadow:'0 0 6px #ff3333'}}/>
                <span style={{fontSize:'.64rem',fontFamily:'var(--mono)',color:'#7ab8d0',letterSpacing:'.1em'}}>NATIONAL AGRICULTURAL RISK MONITOR &middot; 2026-05-25 11:00 CST</span>
              </div>
              <span style={{fontSize:'.64rem',fontFamily:'var(--mono)',color:neonBlue,letterSpacing:'.12em'}}>MULTI-AGENT FUSION</span>
            </div>
            <div style={{position:'relative'}}>
              <div ref={mapRef} style={{width:'100%',height:500}}/>
              <div style={{position:'absolute',inset:0,pointerEvents:'none',backgroundImage:'repeating-linear-gradient(0deg,transparent 0,transparent 24px,rgba(0,200,255,0.025) 24px,rgba(0,200,255,0.025) 25px),repeating-linear-gradient(90deg,transparent 0,transparent 24px,rgba(0,200,255,0.015) 24px,rgba(0,200,255,0.015) 25px)'}}/>
            </div>
            <div style={{padding:'8px 16px',borderTop:'1px solid rgba(0,200,255,0.18)',display:'flex',alignItems:'center',gap:'1.4rem',flexWrap:'wrap',background:'rgba(0,20,50,0.65)'}}>
              {[{hv:'#ff3333',l:'&#x9AD8;&#x98CE;&#x9669;',n:counts.high||0},{hv:'#ff8c00',l:'&#x4E2D;&#x98CE;&#x9669;',n:counts.medium||0},{hv:'#aadd00',l:'&#x4F4E;&#x98CE;&#x9669;',n:counts.low||0},{hv:'#00e5cc',l:'&#x5B89;&#x5168;',n:counts.safe||0}].map((x,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:5}}>
                  <div style={{width:10,height:10,borderRadius:2,background:x.hv,boxShadow:`0 0 6px ${x.hv}88`}}/>
                  <span style={{fontSize:'.68rem',color:'#7ab8d0',fontFamily:'var(--mono)'}} dangerouslySetInnerHTML={{__html:x.l+' ('+x.n+')'}}/>
                </div>
              ))}
              <div style={{marginLeft:'auto',fontSize:'.62rem',color:'#3a7a8a',fontFamily:'var(--mono)'}}>&#x9F20;&#x6807;&#x60AC;&#x505C;&#x770B;&#x8BE6;&#x60C5; &rarr;</div>
            </div>
          </div>
          <div style={{position:'sticky',top:90,display:'flex',flexDirection:'column',gap:'.85rem'}}>
            {info?(
              <div style={{borderRadius:12,padding:'1.4rem',background:panelBg,border:`1px solid ${lc.bd}`,boxShadow:`0 0 24px ${lc.gw}`,transition:'all .25s'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:'1.5rem',color:'#e8f4ff',fontFamily:'var(--mono)',letterSpacing:'.04em'}}>{hovered}</div>
                    <div style={{fontSize:'.68rem',color:'#5090a8',marginTop:3,fontFamily:'var(--mono)'}}>&#x6D89;&#x53CA;&#x9762;&#x79EF; {info.ar}</div>
                  </div>
                  <span style={{fontSize:'.6rem',fontFamily:'var(--mono)',padding:'3px 9px',borderRadius:4,background:lc.bg,border:`1px solid ${lc.bd}`,color:lc.tx,fontWeight:700,whiteSpace:'nowrap',boxShadow:`0 0 10px ${lc.gw}`}}>{lvLabel[info.lv]}</span>
                </div>
                {[['RISK TYPE',info.rk,lc.tx],['AFFECTED CROP',info.cr,'#b8daf0'],['CONFIDENCE',info.cf+'%',neonBlue],['TIME WINDOW',info.wi,'#ffaa44']].map(([lb,val,clr],i)=>(
                  <div key={i} style={{marginBottom:'.6rem',paddingBottom:'.6rem',borderBottom:i<3?'1px solid rgba(0,200,255,0.10)':'none'}}>
                    <div style={{fontSize:'.57rem',fontFamily:'var(--mono)',color:'#3a6a7a',marginBottom:3,letterSpacing:'.14em'}}>{lb}</div>
                    <div style={{fontSize:'.9rem',fontWeight:600,color:clr,textShadow:`0 0 8px ${clr}88`}}>{val}</div>
                  </div>
                ))}
                <div style={{marginTop:'.4rem',padding:'10px 12px',borderRadius:6,background:'rgba(0,200,255,0.05)',border:'1px solid rgba(0,200,255,0.14)'}}>
                  <div style={{fontSize:'.57rem',fontFamily:'var(--mono)',color:'#3a6a7a',marginBottom:4,letterSpacing:'.14em'}}>RECOMMENDED ACTION</div>
                  <div style={{fontSize:'.82rem',color:'#a0c8d8',lineHeight:1.65}}>{info.ac}</div>
                </div>
              </div>
            ):(
              <div style={{borderRadius:12,padding:'1.4rem',background:panelBg,border:panelBd,boxShadow:'0 0 24px rgba(0,200,255,0.08)'}}>
                <div style={{fontSize:'.62rem',fontFamily:'var(--mono)',color:neonBlue,letterSpacing:'.16em',marginBottom:'1rem'}}>OVERVIEW &middot; &#x5168;&#x56FD;&#x6982;&#x89C8;</div>
                {[{l:'&#x9AD8;&#x98CE;&#x9669;',n:counts.high||0,c:'#ff6b6b'},{l:'&#x4E2D;&#x98CE;&#x9669;',n:counts.medium||0,c:'#ffaa44'},{l:'&#x4F4E;&#x98CE;&#x9669;',n:counts.low||0,c:'#bbff33'},{l:'&#x5B89;&#x5168;',n:counts.safe||0,c:'#33ffee'}].map((x,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 0',borderBottom:i<3?'1px solid rgba(0,200,255,0.09)':'none'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:8,height:8,borderRadius:2,background:x.c,boxShadow:`0 0 6px ${x.c}88`}}/>
                      <span style={{fontSize:'.84rem',color:'#9ac8d8',fontFamily:'var(--mono)'}} dangerouslySetInnerHTML={{__html:x.l}}/>
                    </div>
                    <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                      <span style={{fontSize:'1.1rem',fontWeight:600,color:x.c,fontFamily:'var(--mono)',textShadow:`0 0 8px ${x.c}88`}}>{x.n}</span>
                      <span style={{fontSize:'.68rem',color:'#3a6a7a'}}>&#x4E2A;&#x7701;</span>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:'1.1rem',padding:'10px',borderRadius:6,background:'rgba(0,200,255,0.05)',border:'1px solid rgba(0,200,255,0.14)',textAlign:'center',color:'#5a9ab0',fontSize:'.78rem',lineHeight:1.65}}>
                  &#x5C06;&#x9F20;&#x6807;&#x60AC;&#x505C;&#x5230;<br/>&#x5730;&#x56FE;&#x4E2D;&#x7684;&#x7701;&#x4EFD;&#x67E5;&#x770B;&#x8BE6;&#x60C5;
                </div>
              </div>
            )}
            <div style={{borderRadius:10,padding:'1rem',background:panelBg,border:panelBd}}>
              <div style={{fontSize:'.6rem',fontFamily:'var(--mono)',color:neonBlue,letterSpacing:'.16em',marginBottom:'.65rem'}}>DATA SOURCE</div>
              {['&#x6C14;&#x8C61;&#x5B9E;&#x65F6;&#x9884;&#x62A5;&#x878D;&#x5408;','&#x9065;&#x611F;&#x5F02;&#x5E38;&#x68C0;&#x6D4B;&#x5206;&#x6790;','&#x591A; Agent &#x5F15;&#x64CE;&#x6A21;&#x62DF;&#x878D;&#x5408;','&#x5386;&#x53F2;&#x519C;&#x6237;&#x5C5E;&#x5730;&#x753B;&#x50CF;'].map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0'}}>
                  <svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="#00c8ff" opacity=".7"/></svg>
                  <span style={{fontSize:'.72rem',color:'#5a9ab0'}} dangerouslySetInnerHTML={{__html:s}}/>
                </div>
              ))}
            </div>
          </div>
        </div>}
        {tab==='sim'&&(
          <div>
            <div style={{display:'flex',gap:6,marginBottom:'1.2rem',flexWrap:'wrap',alignItems:'center',padding:'10px 14px',borderRadius:10,background:'rgba(4,18,38,0.85)',border:'1px solid rgba(0,200,255,0.18)'}}>
              <span style={{fontSize:'.6rem',fontFamily:'var(--mono)',color:'#5090a8',letterSpacing:'.12em',marginRight:6}}>拖拽天气事件到地图：</span>
              {Object.entries(WT).map(([k,w])=>(
                <div key={k} draggable onDragStart={()=>setDraggingType(k)}
                  style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:6,background:`${w.c}14`,border:`1.5px solid ${w.c}55`,cursor:'grab',userSelect:'none',boxShadow:`0 0 8px ${w.g}`}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={w.c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d={w.p}/></svg>
                  <span style={{fontSize:'.72rem',fontFamily:'var(--mono)',color:w.c,whiteSpace:'nowrap'}}>{w.t}</span>
                </div>
              ))}
            </div>
            <div style={{borderRadius:16,overflow:'hidden',border:'1px solid rgba(0,200,255,0.25)',boxShadow:'0 0 48px rgba(0,200,255,0.10)',background:mapBg}}>
              <div style={{padding:'9px 14px',borderBottom:'1px solid rgba(0,200,255,0.18)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(0,20,50,0.75)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:'#ffaa44',display:'inline-block',boxShadow:'0 0 6px #ffaa44'}}/>
                  <span style={{fontSize:'.64rem',fontFamily:'var(--mono)',color:'#7ab8d0',letterSpacing:'.1em'}}>SIMULATION MODE &middot; 将天气事件拖拽到地图，然后点击运行推演</span>
                </div>
                <span style={{fontSize:'.64rem',fontFamily:'var(--mono)',color:'#ffaa44',letterSpacing:'.12em'}}>已放置 {simMarkers.length} 个事件</span>
              </div>
              <div style={{position:'relative'}}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{e.preventDefault();const rect=e.currentTarget.getBoundingClientRect();const x=parseFloat(((e.clientX-rect.left)/rect.width*100).toFixed(1));const y=parseFloat(((e.clientY-rect.top)/rect.height*100).toFixed(1));if(draggingType)setSimMarkers(prev=>[...prev,{x,y,k:draggingType,id:Date.now()}]);}}>
                <div ref={simMapRef} style={{width:'100%',height:460}}/>
                <div style={{position:'absolute',inset:0,pointerEvents:'none',backgroundImage:'repeating-linear-gradient(0deg,transparent 0,transparent 24px,rgba(0,200,255,0.02) 24px,rgba(0,200,255,0.02) 25px),repeating-linear-gradient(90deg,transparent 0,transparent 24px,rgba(0,200,255,0.015) 24px,rgba(0,200,255,0.015) 25px)'}}/>
                {simMarkers.length===0&&(
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                    <div style={{textAlign:'center',color:'rgba(0,200,255,0.22)',fontFamily:'var(--mono)',fontSize:'.85rem',lineHeight:2}}>
                      <div style={{fontSize:'2.4rem'}}>☁</div>将上方天气图标拖拽到此处
                    </div>
                  </div>
                )}
                <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                  {simMarkers.map((m)=>{const w=WT[m.k];return(
                    <div key={m.id} style={{position:'absolute',left:`${m.x}%`,top:`${m.y}%`,display:'flex',flexDirection:'column',alignItems:'center',gap:2,transform:'translate(-50%,-50%)'}}>
                      <div style={{width:24,height:24,borderRadius:'50%',background:`${w.c}1a`,border:`1.5px solid ${w.c}`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 12px ${w.g}`}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={w.c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d={w.p}/></svg>
                      </div>
                      <span style={{fontSize:8,fontFamily:'var(--mono)',color:w.c,whiteSpace:'nowrap',textShadow:'0 1px 5px rgba(0,0,0,0.95)',lineHeight:1}}>{w.t}</span>
                    </div>
                  );})}
                </div>
              </div>
              <div style={{padding:'10px 16px',borderTop:'1px solid rgba(0,200,255,0.18)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(0,20,50,0.65)'}}>
                <span style={{fontSize:'.7rem',fontFamily:'var(--mono)',color:'#5090a8'}}>已放置 {simMarkers.length} 个气象事件</span>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>{setSimMarkers([]);setPipeStep(-1);setPipeRunning(false);}}
                    style={{padding:'5px 14px',borderRadius:5,fontSize:'.72rem',fontFamily:'var(--mono)',background:'rgba(255,50,50,0.1)',border:'1px solid rgba(255,50,50,0.3)',color:'#ff8888',cursor:'pointer'}}>
                    清除
                  </button>
                  <button onClick={runPipeline} disabled={simMarkers.length===0||pipeRunning}
                    style={{padding:'5px 18px',borderRadius:5,fontSize:'.72rem',fontFamily:'var(--mono)',
                      background:simMarkers.length>0&&!pipeRunning?'rgba(0,229,204,0.15)':'rgba(0,200,255,0.05)',
                      border:`1px solid ${simMarkers.length>0&&!pipeRunning?'#00e5cc':'rgba(0,200,255,0.2)'}`,
                      color:simMarkers.length>0&&!pipeRunning?'#00e5cc':'#3a7a8a',
                      cursor:simMarkers.length>0&&!pipeRunning?'pointer':'not-allowed',
                      boxShadow:simMarkers.length>0&&!pipeRunning?'0 0 12px rgba(0,229,204,0.25)':'none'}}>
                    {pipeRunning?'推演中 ...':'▶ 运行推演'}
                  </button>
                </div>
              </div>
            </div>
            {pipeStep>=0&&(
              <div style={{marginTop:'1.5rem',display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:'.62rem',fontFamily:'var(--mono)',color:'#00e5cc',letterSpacing:'.18em',marginBottom:4}}>PIPELINE EXECUTION &middot; 推演流水线</div>
                {PIPE.map((step,i)=>i<=pipeStep&&(
                  <div key={i} style={{borderRadius:10,padding:'14px 18px',background:'rgba(4,18,38,0.95)',border:`1px solid ${step.c}33`,boxShadow:`0 0 16px ${step.c}18`,display:'flex',gap:16,alignItems:'flex-start',animation:'fade-in-up .4s ease-out both'}}>
                    <div style={{flexShrink:0,width:36,height:36,borderRadius:8,background:`${step.c}14`,border:`1.5px solid ${step.c}55`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:'.65rem',fontWeight:700,color:step.c}}>{step.n}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'.72rem',fontFamily:'var(--mono)',color:step.c,fontWeight:700,marginBottom:6,letterSpacing:'.08em'}}>{step.label}</div>
                      <pre style={{fontSize:'.7rem',fontFamily:'var(--mono)',color:'#7ab8d0',lineHeight:1.75,margin:0,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{pipeOutputs[i]||'推演中...'}</pre>
                    </div>
                    {i===pipeStep&&pipeRunning
                      ?<div style={{flexShrink:0,width:8,height:8,borderRadius:'50%',background:step.c,animation:'blink-dot 0.8s ease-in-out infinite',alignSelf:'center'}}/>
                      :<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={step.c} strokeWidth="2.5" style={{flexShrink:0,alignSelf:'center'}}><polyline points="20 6 9 17 4 12"/></svg>
                    }
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </section>
  );
}

function App() {
  useEffect(()=>{
    const prog=document.getElementById('scroll-prog');
    if(!prog)return;
    const h=()=>{const max=document.documentElement.scrollHeight-window.innerHeight;prog.style.transform=`scaleX(${max>0?window.scrollY/max:0})`;}
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  return (
    <div>
      <NavBar/>
      <Hero/>
      <ChinaRiskMapSection/>
      <PainPoints/>
      <RiskMapSection/>
      <SystemCapabilities/>
      <MultiAgents/>
      <PipelineSection/>
      <ScenarioDemo/>
      <DataFlywheel/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
